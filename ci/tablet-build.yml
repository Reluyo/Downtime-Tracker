name: Build Tablet APK

# Builds an installable Android APK for the PRSA tablet app so you don't need
# a local Flutter setup. Download the artifact from the run summary, then
# sideload it onto the Fire tablet.
#
# For an APK that actually connects to Supabase, add these repository secrets
# (Settings -> Secrets and variables -> Actions):
#   SUPABASE_URL        e.g. https://ktcdpogaxxmjdqhsmiev.supabase.co
#   SUPABASE_ANON_KEY   the publishable (sb_publishable_...) key
# Without them the APK still builds but won't reach the backend.

on:
  push:
    branches: ["**"]
    paths:
      - "tablet/**"
      - ".github/workflows/tablet-build.yml"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tablet
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform files
        run: flutter create --platforms=android --project-name prsa_tablet .

      - name: Write .env
        run: |
          if [ -n "${{ secrets.SUPABASE_URL }}" ]; then
            {
              echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
              echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"
              echo "LINE_SHORT_NAME=PRSA 2"
            } > .env
          else
            cp .env.example .env
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: prsa-tablet-apk
          path: tablet/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
