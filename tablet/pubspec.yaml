name: astemo_tablet
description: Astemo Downtime Tracker — operator tablet app (Flutter, offline-first).
publish_to: "none"
version: 0.1.0+2

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.6

  # Offline-first local storage (SQLite)
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Connectivity detection for sync
  connectivity_plus: ^6.0.3

  # Config / env
  flutter_dotenv: ^5.1.0

  # Alert sound on the active downtime screen
  audioplayers: ^6.0.0

  # Keep the screen awake while a downtime event is active
  wakelock_plus: ^1.2.5

  # Misc
  intl: ^0.19.0
  uuid: ^4.4.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # drift code generation (run: dart run build_runner build)
  drift_dev: ^2.18.0
  build_runner: ^2.4.11

  # App launcher icon generation
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/sounds/alert.wav
